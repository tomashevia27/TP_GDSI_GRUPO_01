services:
  postgres:
    image: postgres:14
    container_name: bdd_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bdd_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgresdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bdd_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:admin123@postgres:5432/bdd_db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: bdd_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  pgadmin:
    image: dpage/pgadmin4:7.5
    container_name: bdd_pg_admin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmindata:/var/lib/pgadmin

volumes:
  pgadmindata:
  postgresdata: